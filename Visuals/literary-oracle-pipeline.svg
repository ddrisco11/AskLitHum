<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780" role="img" aria-labelledby="title desc">
  <title id="title">Literary Oracle — RAG pipeline</title>
  <desc id="desc">Offline indexing and online hybrid Granite plus Mistral retrieval flow.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1b18"/>
      <stop offset="50%" stop-color="#252219"/>
      <stop offset="100%" stop-color="#1a1815"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7f3eb"/>
      <stop offset="100%" stop-color="#ebe4d6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a67c2d"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="b"/>
      <feOffset dx="0" dy="2" result="o"/>
      <feMerge><feMergeNode in="o"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#6b5c45"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#9a7b3a"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  <!-- Decorative frame -->
  <rect x="28" y="24" width="1144" height="732" rx="4" fill="none" stroke="#3d3428" stroke-width="1"/>
  <rect x="36" y="32" width="1128" height="716" rx="2" fill="none" stroke="#5c4d38" stroke-width="0.5" opacity="0.6"/>

  <!-- Header -->
  <text x="600" y="72" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#f0ebe3" letter-spacing="0.06em">Literary Oracle</text>
  <text x="600" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#a89878" letter-spacing="0.35em">PIPELINE</text>

  <!-- ========== Offline strip ========== -->
  <text x="60" y="138" font-family="Georgia, serif" font-size="11" fill="#8a7b62" letter-spacing="0.2em">OFFLINE — INDEX ONCE</text>

  <rect x="60" y="152" width="1080" height="88" rx="10" fill="url(#paper)" opacity="0.94" filter="url(#soft)"/>
  <rect x="60" y="152" width="1080" height="88" rx="10" fill="none" stroke="#c4b89a" stroke-width="0.75"/>

  <!-- Offline nodes -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#2c261e">
    <rect x="78" y="172" width="130" height="48" rx="6" fill="#fff" stroke="#c9b896"/>
    <text x="143" y="192" text-anchor="middle" font-weight="600" font-size="10">Works /</text>
    <text x="143" y="206" text-anchor="middle" fill="#5c4d38">Dante · Augustine · Austen</text>
    <text x="143" y="218" text-anchor="middle" fill="#5c4d38">Shakespeare · Tolstoy</text>

    <line x1="208" y1="196" x2="248" y2="196" stroke="#8b7d62" stroke-width="1.2" marker-end="url(#arrow)"/>

    <rect x="252" y="176" width="118" height="40" rx="6" fill="#faf8f4" stroke="#c9b896"/>
    <text x="311" y="194" text-anchor="middle" font-weight="600">Clean &amp; chunk</text>
    <text x="311" y="208" text-anchor="middle" font-size="9.5" fill="#6b5c45">~150 words, normalized</text>

    <line x1="370" y1="196" x2="408" y2="196" stroke="#8b7d62" stroke-width="1.2" marker-end="url(#arrow)"/>

    <rect x="412" y="176" width="124" height="40" rx="6" fill="#faf8f4" stroke="#c9b896"/>
    <text x="474" y="194" text-anchor="middle" font-weight="600">MiniLM embed</text>
    <text x="474" y="208" text-anchor="middle" font-size="9.5" fill="#6b5c45">all-MiniLM-L6-v2</text>

    <line x1="536" y1="196" x2="574" y2="196" stroke="#8b7d62" stroke-width="1.2" marker-end="url(#arrow)"/>

    <rect x="578" y="168" width="200" height="56" rx="6" fill="#fffef9" stroke="url(#gold)" stroke-width="1.2"/>
    <text x="678" y="188" text-anchor="middle" font-weight="600" fill="#4a3f28">chunks.json</text>
    <text x="678" y="204" text-anchor="middle" font-size="9.5" fill="#6b5c45">+</text>
    <text x="678" y="218" text-anchor="middle" font-weight="600" fill="#4a3f28">embeddings.npy</text>
  </g>

  <!-- ========== Online main flow ========== -->
  <text x="60" y="288" font-family="Georgia, serif" font-size="11" fill="#8a7b62" letter-spacing="0.2em">ONLINE — EACH QUESTION</text>

  <rect x="60" y="302" width="1080" height="380" rx="12" fill="#0f0e0c" stroke="#3d3428" stroke-width="1"/>
  <rect x="72" y="316" width="1056" height="352" rx="8" fill="#161411" stroke="#2a2520"/>

  <!-- Flow row -->
  <g font-family="'Segoe UI', system-ui, sans-serif">
    <!-- User -->
    <rect x="100" y="360" width="100" height="52" rx="8" fill="#2a2520" stroke="#6b5c45"/>
    <text x="150" y="384" text-anchor="middle" fill="#e8e0d4" font-size="11.5" font-weight="600">Question</text>
    <text x="150" y="400" text-anchor="middle" fill="#9a8b72" font-size="9">user text</text>

    <line x1="200" y1="386" x2="228" y2="386" stroke="#7a6b52" stroke-width="1.5" marker-end="url(#arrowGold)"/>

    <!-- QR -->
    <rect x="232" y="352" width="96" height="68" rx="8" fill="#1e2428" stroke="#b8952e"/>
    <text x="280" y="376" text-anchor="middle" fill="#d4af37" font-size="10" font-weight="700">QR</text>
    <text x="280" y="392" text-anchor="middle" fill="#c4b89a" font-size="8.5">Granite</text>
    <text x="280" y="406" text-anchor="middle" fill="#9a8b72" font-size="8">rewrite query</text>

    <line x1="328" y1="386" x2="356" y2="386" stroke="#7a6b52" stroke-width="1.5" marker-end="url(#arrowGold)"/>

    <!-- Retrieve -->
    <rect x="360" y="352" width="108" height="68" rx="8" fill="#1e2428" stroke="#8b7d62"/>
    <text x="414" y="374" text-anchor="middle" fill="#e8e0d4" font-size="10" font-weight="600">Retrieve</text>
    <text x="414" y="390" text-anchor="middle" fill="#9a8b72" font-size="8">cosine · top-N</text>
    <text x="414" y="404" text-anchor="middle" fill="#7a6b52" font-size="7.5">MiniLM vs index</text>

    <line x1="468" y1="386" x2="496" y2="386" stroke="#7a6b52" stroke-width="1.5" marker-end="url(#arrowGold)"/>

    <!-- CR -->
    <rect x="500" y="352" width="96" height="68" rx="8" fill="#1e2428" stroke="#b8952e"/>
    <text x="548" y="376" text-anchor="middle" fill="#d4af37" font-size="10" font-weight="700">CR</text>
    <text x="548" y="392" text-anchor="middle" fill="#c4b89a" font-size="8.5">Granite</text>
    <text x="548" y="406" text-anchor="middle" fill="#9a8b72" font-size="8">relevance · top-K</text>

    <line x1="596" y1="386" x2="624" y2="386" stroke="#7a6b52" stroke-width="1.5" marker-end="url(#arrowGold)"/>

    <!-- AD -->
    <rect x="628" y="352" width="96" height="68" rx="8" fill="#1e2428" stroke="#b8952e"/>
    <text x="676" y="376" text-anchor="middle" fill="#d4af37" font-size="10" font-weight="700">AD</text>
    <text x="676" y="392" text-anchor="middle" fill="#c4b89a" font-size="8.5">Granite</text>
    <text x="676" y="406" text-anchor="middle" fill="#9a8b72" font-size="8">answerability</text>

    <line x1="724" y1="386" x2="752" y2="386" stroke="#7a6b52" stroke-width="1.5" marker-end="url(#arrowGold)"/>

    <!-- Persona + Mistral -->
    <rect x="756" y="348" width="124" height="76" rx="8" fill="#252018" stroke="#6b8f71"/>
    <text x="818" y="372" text-anchor="middle" fill="#b8d4be" font-size="10" font-weight="600">Persona + LLM</text>
    <text x="818" y="388" text-anchor="middle" fill="#c4b89a" font-size="8">dominant work · voice</text>
    <text x="818" y="402" text-anchor="middle" fill="#e8e0d4" font-size="9" font-weight="600">Mistral (Ollama)</text>
    <text x="818" y="416" text-anchor="middle" fill="#9a8b72" font-size="8">JSON in character</text>

    <line x1="880" y1="386" x2="908" y2="386" stroke="#7a6b52" stroke-width="1.5" marker-end="url(#arrowGold)"/>

    <!-- HD -->
    <rect x="912" y="352" width="88" height="68" rx="8" fill="#1e2428" stroke="#b8952e"/>
    <text x="956" y="376" text-anchor="middle" fill="#d4af37" font-size="10" font-weight="700">HD</text>
    <text x="956" y="394" text-anchor="middle" fill="#c4b89a" font-size="8.5">Granite</text>
    <text x="956" y="408" text-anchor="middle" fill="#9a8b72" font-size="8">hallucination</text>

    <line x1="1000" y1="386" x2="1028" y2="386" stroke="#7a6b52" stroke-width="1.5" marker-end="url(#arrowGold)"/>

    <!-- CG -->
    <rect x="1032" y="352" width="88" height="68" rx="8" fill="#1e2428" stroke="#b8952e"/>
    <text x="1076" y="376" text-anchor="middle" fill="#d4af37" font-size="10" font-weight="700">CG</text>
    <text x="1076" y="394" text-anchor="middle" fill="#c4b89a" font-size="8.5">Granite</text>
    <text x="1076" y="408" text-anchor="middle" fill="#9a8b72" font-size="8">citations</text>
  </g>

  <!-- Output card -->
  <rect x="380" y="470" width="440" height="100" rx="10" fill="#1a1815" stroke="#5c4d38"/>
  <text x="600" y="498" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#d4af37" letter-spacing="0.15em">RESPONSE</text>
  <text x="600" y="522" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#c4b89a">responder · answer · themes · evidence · citations · pipeline metrics</text>
  <text x="600" y="544" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#7a6b52">Flask JSON — optional stages via GRANITE_STAGES</text>

  <!-- Legend -->
  <g transform="translate(100, 598)">
    <rect x="0" y="0" width="1000" height="1" fill="#3d3428" opacity="0.5"/>
    <text x="0" y="28" font-family="Georgia, serif" font-size="10" fill="#8a7b62">Legend</text>
    <rect x="70" y="12" width="14" height="14" rx="3" fill="#1e2428" stroke="#b8952e"/>
    <text x="92" y="24" font-family="'Segoe UI', sans-serif" font-size="9" fill="#b8a990">IBM Granite adapter stage</text>
    <rect x="280" y="12" width="14" height="14" rx="3" fill="#252018" stroke="#6b8f71"/>
    <text x="302" y="24" font-family="'Segoe UI', sans-serif" font-size="9" fill="#b8a990">Retrieval / generation</text>
    <rect x="480" y="12" width="14" height="14" rx="3" fill="#faf8f4" stroke="#c9b896"/>
    <text x="502" y="24" font-family="'Segoe UI', sans-serif" font-size="9" fill="#b8a990">Offline index (ingest.py)</text>
  </g>

  <text x="600" y="748" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5c4d38" font-style="italic">For personal reference — not part of the web app</text>
</svg>
